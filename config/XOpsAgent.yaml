server:
  api:
    listen: "0.0.0.0:${XSCOPE_LLM_OPS_AGENT_PORT}"
    response_format: json

inputs:
  postgres:
    url: "${DATABASE_URL}"
  observe_gateway:
    endpoint: "${XSCOPE_OBSERVE_GATEWAY_URL}"
    tenant_header: "${OBSERVE_GATEWAY_TENANT_HEADER}"
    user_header: "${OBSERVE_GATEWAY_USER_HEADER}"
    default_tenant: "${XSCOPE_DEFAULT_TENANT}"
    default_user: "${XSCOPE_DEFAULT_USER}"
    timeout: 20s
  openobserve:
    endpoint: ""
    headers: {}

models:
  embedder:
    name: "disabled"
    endpoint: ""
  generator:
    models: []
    endpoint: ""
  codex:
    enabled: ${XSCOPE_CODEX_ENABLED}
    command: "${XSCOPE_CODEX_COMMAND}"
    args: []
    working_dir: "/Users/shenlan/workspaces/cloud-neutral-toolkit/x-scope-hub.svc.plus"
    timeout: ${XSCOPE_CODEX_TIMEOUT}
    env:
      CODEX_HOME: "${XSCOPE_CODEX_HOME}"
      XSCOPE_CODEX_MODEL: "${XSCOPE_CODEX_MODEL}"
      XSCOPE_CODEX_SANDBOX: "${XSCOPE_CODEX_SANDBOX}"
      XSCOPE_MCP_SERVER_URL: "${XSCOPE_MCP_SERVER_URL}"
      XSCOPE_MCP_SERVER_AUTH_TOKEN: "${XSCOPE_MCP_SERVER_AUTH_TOKEN}"
      XSCOPE_DEFAULT_TENANT: "${XSCOPE_DEFAULT_TENANT}"
      XSCOPE_DEFAULT_USER: "${XSCOPE_DEFAULT_USER}"

outputs:
  github_pr:
    enabled: false
    repo: ""
    token_env: "GITHUB_TOKEN"

  file_report:
    enabled: false
    path: "./reports/{{case_id}}.md"
    format: "markdown"

  answer:
    enabled: true
    channel: "stdout"

  webhook:
    enabled: false
    url: "https://example.com/hook"
    headers:
      X-Token: "secret"
